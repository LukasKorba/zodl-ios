name: E2E Smoke Tests

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/*'
      - '.github/pull_request_template.md'
      - 'LICENSE'
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # flexa-ios uses iOS 26's `.glass` button style which isn't available
  # on the macos-15 runner's Xcode. Disable it to keep CI building.
  FX_ENABLE_GLASS: "0"
  DERIVED_DATA_PATH: build
  SOURCE_PACKAGES_PATH: build/SourcePackages

jobs:
  e2e-ios:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout smoke tests
        uses: actions/checkout@v4
        with:
          repository: zodl-inc/zodl-qa
          path: zodl-qa
          token: ${{ secrets.ZODL_QA }}

      - name: Compute Xcode cache key
        id: xcode-cache-key
        run: |
          xcodebuild -version
          xcodebuild -version | shasum -a 256 | awk '{ print "hash="$1 }' >> "$GITHUB_OUTPUT"

      - name: Restore Swift package cache
        id: spm-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.SOURCE_PACKAGES_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-spm-e2e-${{ steps.xcode-cache-key.outputs.hash }}-${{ hashFiles('secant.xcodeproj/project.pbxproj', 'secant.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-spm-e2e-${{ steps.xcode-cache-key.outputs.hash }}-
            ${{ runner.os }}-${{ runner.arch }}-xcode-spm-e2e-

      - name: Resolve packages
        run: |
          xcodebuild -project secant.xcodeproj \
            -scheme zashi-internal \
            -resolvePackageDependencies \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Save Swift package cache
        if: ${{ steps.spm-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SOURCE_PACKAGES_PATH }}
          key: ${{ steps.spm-cache.outputs.cache-primary-key }}

      - name: Build for simulator
        # Ad-hoc sign ("-") so the app's entitlements (Keychain access group
        # etc.) are embedded in the build. Plain CODE_SIGNING_ALLOWED=NO
        # leaves the bundle without entitlements, which makes the app crash
        # on launch with error -34018 (errSecMissingEntitlement) the moment
        # it touches the Keychain.
        run: |
          xcodebuild build \
            -project secant.xcodeproj \
            -scheme zashi-internal \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: Boot simulator and install app
        run: |
          # Boot, then wait for the device to be fully ready before installing.
          xcrun simctl boot "iPhone 16 Pro" || true
          xcrun simctl bootstatus "iPhone 16 Pro" -b

          # On CI the simulator defaults to "Connect Hardware Keyboard",
          # which hides the software keyboard and causes XCUITest typeText
          # to silently no-op (maestro reports inputText "completed" but
          # nothing lands in the fields). Force-disable it.
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard 0
          defaults write com.apple.iphonesimulator AutomaticallyShowSoftKeyboard 1

          # Resolve the .app explicitly — fail loudly if glob matched zero
          # or more than one bundle.
          shopt -s nullglob
          APPS=(build/Build/Products/Debug-iphonesimulator/*.app)
          if [ "${#APPS[@]}" -ne 1 ]; then
              echo "Expected exactly one .app, found ${#APPS[@]}:"
              printf '  %s\n' "${APPS[@]}"
              exit 1
          fi
          APP="${APPS[0]}"
          echo "Installing $APP"
          xcrun simctl install booted "$APP"

          # Verify the app is actually present before handing off to maestro.
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          xcrun simctl listapps booted | grep -q "\"$BUNDLE_ID\"" \
              || { echo "App $BUNDLE_ID not installed after simctl install"; exit 1; }

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run smoke tests
        env:
          # XCUITest driver build/install can take a few minutes on CI;
          # default 60s timeout isn't enough on a cold runner.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          maestro test zodl-qa/maestro/smoke/ \
            --include-tags="ios"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-results
          path: ~/.maestro/tests/
